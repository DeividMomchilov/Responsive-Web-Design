<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    <link rel="stylesheet" href="/Interest Calculator/styles.css">
</head>
<body>
    <h1>Interest Calculator</h1>
        <form id="interest-form">
            <label for="principal">Principal:</label>
            <input type="number" id="principal" name="principal" required min="0">

            <label for="rate">Interest Rate:</label>
            <input type="number" id="rate" name="rate" required min="0">

            <label for="years">Time:</label>
            <input type="number" id="years" name="years" required min="0" max ="100">

            <button type="button" id="calculate" onclick="calculateInterest()">Calculate</button>

            <p id="result">Total Interest: <span id="total-interest">$0</span></p>
        </form>
    <script src="/Interest Calculator/index.js"></script>   
</body>
</html>
